name: CI

# Quality gate + automatic production deploy.
#   verify — lint · typecheck · build, on every push to main and every PR.
#   deploy — on push to main only, AFTER verify passes: deploys to Vercel
#            production via the Vercel CLI. This is the auto-deploy-on-push
#            pipeline (the native Vercel Git integration isn't relied on).
#            Requires three repo secrets: VERCEL_TOKEN, VERCEL_ORG_ID,
#            VERCEL_PROJECT_ID.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Dummy values — the build doesn't hit these services (all data routes
          # are dynamic/server-rendered), they just need to be defined so module
          # init doesn't fail. Real values live in Vercel's env settings.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-role-key
          AI_KEY_SECRET: ci-dummy-encryption-secret
          NEXT_PUBLIC_SITE_URL: https://example.com

  deploy:
    name: Deploy · Vercel production
    needs: verify
    # Only real pushes to main deploy; PRs stop at the verify gate above.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      # Source deploy: Vercel builds on its own infrastructure with the FULL
      # project env. Do NOT switch to pull/build/--prebuilt — sensitive env vars
      # are excluded from `vercel pull`, so a CI-side build bakes undefined
      # NEXT_PUBLIC_* values into the bundle and every page 500s (learned the
      # hard way on the first pipeline run).
      - name: Deploy to production
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
